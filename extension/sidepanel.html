<!doctype html>
<html lang="en" style="height: 100%; margin: 0;">
<head>
  <meta charset="UTF-8" />
  <title>Clawable</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #18181b; }
    iframe { width: 100%; height: 100%; border: none; display: none; }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #a1a1aa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .loading.error { color: #f87171; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div id="loading" class="loading">Starting server...</div>
  <iframe id="app" allow="clipboard-read; clipboard-write"></iframe>
  <script src="sidepanel.js"></script>
</body>
</html>
